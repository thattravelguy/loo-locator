<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Loo Locator">
  <meta name="description" content="Find public toilets across Europe — free, accessible, open now.">
  <title>Loo Locator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app" class="app">

    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <span class="app-title">Loo <span class="accent">Locator</span></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="darkToggleBtn" aria-label="Toggle dark mode" onclick="toggleDark()">
          <svg id="darkIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="offlineBtn" aria-label="Offline status" title="Offline mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        </button>
      </div>
    </header>

    <nav class="city-nav" id="cityNav" aria-label="Select city">
      <div class="city-tabs-scroll">
        <button class="city-tab active" data-city="budapest">Budapest</button>
        <button class="city-tab" data-city="vienna">Vienna</button>
        <button class="city-tab" data-city="zurich">Zurich</button>
        <button class="city-tab" data-city="strasbourg">Strasbourg</button>
        <button class="city-tab" data-city="cologne">Cologne</button>
        <button class="city-tab" data-city="helsinki">Helsinki</button>
        <button class="city-tab" data-city="barcelona">Barcelona</button>
        <button class="city-tab" data-city="madrid">Madrid</button>
        <button class="city-tab" data-city="seville">Seville</button>
        <button class="city-tab" data-city="malaga">Malaga</button>
        <button class="city-tab" data-city="zaragoza">Zaragoza</button>
        <button class="city-tab" data-city="lisbon">Lisbon</button>
        <button class="city-tab" data-city="porto">Porto</button>
        <button class="city-tab" data-city="funchal">Funchal</button>
      </div>
    </nav>

    <div id="map" class="map-container" aria-label="Map of toilet locations"></div>

    <button class="locate-fab" id="locateBtn" aria-label="Find nearest toilet" onclick="findNearest()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="10" stroke-dasharray="2 3"/></svg>
    </button>

    <button class="add-fab" id="addBtn" aria-label="Add a toilet" onclick="openAddForm()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div class="filter-bar" id="filterBar">
      <button class="filter-chip" data-filter="free" onclick="toggleFilter(this)">Free</button>
      <button class="filter-chip" data-filter="accessible" onclick="toggleFilter(this)">Accessible</button>
      <button class="filter-chip" data-filter="open247" onclick="toggleFilter(this)">Open 24/7</button>
      <button class="filter-chip osm-btn" id="osmLoadBtn" onclick="loadOsmData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:4px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>
        Load live data
      </button>
    </div>

    <!-- Detail sheet -->
    <div class="bottom-sheet" id="detailSheet" aria-modal="true" role="dialog" aria-label="Toilet details">
      <div class="sheet-handle-row">
        <div class="sheet-handle"></div>
        <button class="sheet-close-btn" aria-label="Close" onclick="closeSheet('detailSheet')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-content" id="detailContent"></div>
    </div>

    <!-- Add toilet sheet -->
    <div class="bottom-sheet" id="addSheet" aria-modal="true" role="dialog" aria-label="Add a toilet">
      <div class="sheet-handle-row">
        <div class="sheet-handle"></div>
        <button class="sheet-close-btn" aria-label="Close" onclick="closeSheet('addSheet')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-content">
        <h2 class="sheet-title">Add a toilet</h2>
        <p class="sheet-subtitle">Help others by adding a location you know about.</p>
        <form id="addForm" onsubmit="submitNewToilet(event)">
          <label class="form-label">Name / description
            <input type="text" id="addName" placeholder="e.g. Hauptbahnhof lower level" required>
          </label>
          <label class="form-label">Location
            <div class="location-row">
              <input type="text" id="addLocation" placeholder="Tap map or use current location" readonly>
              <button type="button" class="loc-btn" onclick="useCurrentLocationForAdd()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
              </button>
            </div>
          </label>
          <div class="form-row">
            <label class="form-check"><input type="checkbox" id="addFree"> Free to use</label>
            <label class="form-check"><input type="checkbox" id="addAccessible"> Accessible</label>
            <label class="form-check"><input type="checkbox" id="add247"> Open 24/7</label>
          </div>
          <label class="form-label">Opening hours (if not 24/7)
            <input type="text" id="addHours" placeholder="e.g. 8:00–20:00">
          </label>
          <label class="form-label">Photo (optional)
            <div class="photo-upload" id="photoUploadArea" onclick="document.getElementById('photoInput').click()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <span id="photoLabel">Tap to add a photo</span>
            </div>
            <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoSelect(event)">
          </label>
          <label class="form-label">Notes
            <textarea id="addNotes" placeholder="Anything useful: floor level, signage, cleanliness…" rows="2"></textarea>
          </label>
          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeSheet('addSheet')">Cancel</button>
            <button type="submit" class="btn-primary">Submit location</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loadingText">Loading live data…</p>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="osm.js"></script>
  <script src="app.js"></script>
</body>
</html>
